name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore BigFitnes/BigFitnes.csproj -f net9.0-android

      - name: Build APK (Release)
        run: |
          dotnet publish BigFitnes/BigFitnes.csproj \
            -f net9.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidSigningKeyStore="" \
            -p:AndroidKeyStore=false \
            --output ./artifacts

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find ./artifacts -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BigFitness ${{ github.ref_name }}
          body: |
            ## BigFitness ${{ github.ref_name }}

            ### Installation
            1. Download `BigFitness.apk`
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK

            Requires Android 7.0 (API 24) or higher.
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: false
